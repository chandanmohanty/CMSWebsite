name: Deploy API to Hostinger

# Deploys the Laravel API to api.athithi24.com on every push to main.
# Composer runs in the CI runner, so the shared host needs neither composer
# nor a git clone, and the private repo checks out with the Actions token.
#
# The Next.js frontend is NOT deployed here. Hostinger's own Node.js build
# system owns it (it builds from an uploaded source archive and runs the app
# under Passenger), so a second deploy path would fight it. Frontend releases
# are a manual step - see DEPLOY.md - and are only needed when frontend *code*
# changes: all CMS content is fetched from the API at runtime, so editing
# pages, templates or media never requires a redeploy.

on:
  push:
    branches: [main]
  workflow_dispatch: # allows a manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_PORT: ${{ secrets.SSH_PORT }}
  SSH_USER: ${{ secrets.SSH_USER }}
  BACKEND_DEST: domains/api.athithi24.com/repo/backend

jobs:
  backend:
    name: Deploy Laravel API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, gd, intl, zip, pdo_mysql, fileinfo, curl
          tools: composer:v2

      - name: Install PHP dependencies
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust the server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      # Create the app dir + Laravel's writable skeleton up front, so rsync has
      # a target and the server never needs a manual git clone. These dirs are
      # excluded from the rsync below, so uploaded media survives every deploy.
      - name: Prepare server directories
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p \
            ~/$BACKEND_DEST/storage/app/public \
            ~/$BACKEND_DEST/storage/framework/cache/data \
            ~/$BACKEND_DEST/storage/framework/sessions \
            ~/$BACKEND_DEST/storage/framework/views \
            ~/$BACKEND_DEST/storage/logs \
            ~/$BACKEND_DEST/bootstrap/cache"

      # --delete keeps the server tidy; the excludes protect server-owned
      # state: the .env, uploaded media + logs in storage/, the compiled
      # bootstrap cache, and the public/storage symlink.
      - name: Deploy backend code
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='/storage/' \
            --exclude='/bootstrap/cache/' \
            --exclude='/public/storage' \
            -e "ssh -p $SSH_PORT" \
            backend/ "$SSH_USER@$SSH_HOST:$BACKEND_DEST/"

      # Migrate only once .env exists (it holds APP_KEY + DB creds and is never
      # in the repo). Until then the code still deploys; the run stays green.
      - name: Migrate, cache config, ensure storage link
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "\
            cd ~/$BACKEND_DEST && \
            { [ -L public/storage ] || ln -s ../storage/app/public public/storage; } && \
            if [ -f .env ]; then \
              php artisan migrate --force && \
              php artisan config:cache && \
              php artisan route:cache; \
            else \
              echo '>> No .env on the server yet — code is deployed, skipping migrate. Create .env and run migrate --seed once (see DEPLOY.md), then re-run.'; \
            fi"
